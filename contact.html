<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
   
        <link rel="stylesheet" href="./assets/css/Site.css">
        <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
       
     
</head>
<body>
    <br><br> <a href="index.html" class="btn">Home</a>
    <header>
        
   
        <section id="contact" >
            <div class="container">
                <h2 class="heading">Contact <span>Me!</span></h2>
        
                <div class="contact-form">
                    <form action="https://formspree.io/f/mqaeroew" method="POST">
                        <div class="form-group">
                            <h2  class="contact">Name:</h2><br>
                            <input type="text" id="name" name="name" class="input" placeholder="Enter Your Name" required>
                        </div>
        
                        <div class="form-group">
                            <h2 class="contact">Email:</h2><br>
                            <input type="email" id="email" name="email" class="input" placeholder="Enter Your Email" required>
                        </div>
        
                        <div class="form-group">
                            <h2  class="contact">Message:</h2><br>
                            <textarea id="message" name="message" class="input" rows="7" placeholder="Enter Your Message" required></textarea>
                        </div>
        <br>
                    <center>   <input type="submit" value="Submit" class="btn"></center> 
                    </form>
                </div>
            </div>
        </section>

       
    </section>

    <div class="cursor"></div>
    <div class="services-container">
        <div class="services-box1">
            <h3>Email</h3>
            <i class='bx bxl-gmail'></i>
                <div class="about-img">
                    <a href="https://mail.google.com/mail/u/0/?tab=rm&ogbl#inbox"><h3>mynadesha@gmail.com</h3></a>
                </div>
                
        </div>
       
        <div class="services-box1">
        <h3>LinkedIn</h3>
        <i class='bx bxl-linkedin' ></i>
            <div class="about-img">
                <a href="https://www.linkedin.com/in/mynavathi" target="_blank"><h3>www.linkedin.com/in/mynavathi</h3></a>
            </div>
</div>
<div class="services-container">
    <div class="services-box2">
        <h3>Github</h3>
        <i class="bi bi-github"></i>
            <div class="about-img">
                <a href="https://github.com/MYNAVATHI-S"><h3>https://github.com/MYNAVATHI-S</h3></a>
            </div>
            
    </div>



</div>
</header>

<script>
       const cursor = document.querySelector('.cursor');

document.addEventListener('mousemove', e => {
  const x = e.clientX, y = e.clientY;
  cursor.style.left = x + 'px';
  cursor.style.top  = y + 'px';

  // Trail dot with rainbow fade
  const t = document.createElement('div');
  t.className = 'trail';
  t.style.left = x + 'px';
  t.style.top  = y + 'px';
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 1200);

  // Sparkle star (40% chance per move for more sparkle)
  if (Math.random() < 0.4) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    // random offset for sparkles
    s.style.left = (x + (Math.random() * 30 - 15)) + 'px';
    s.style.top  = (y + (Math.random() * 30 - 15)) + 'px';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 700);
  }
});

// Click ripple effect
document.addEventListener('click', e => {
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.left = e.clientX + 'px';
  r.style.top  = e.clientY + 'px';
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 600);
});
</script>

</body>
</html>
